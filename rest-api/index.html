<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cuentas</title>
</head>
<body>

    <h1>Lista de Cuentas</h1>

    <div id="lista"></div>

    <br>

    <button onclick="irAPI()">Ir a /accounts</button>

    <script>
        async function cargar() {
            const res = await fetch('http://localhost:3000/accounts');
            const cuentas = await res.json();

            const div = document.getElementById('lista');
            div.innerHTML = '';

            cuentas.forEach(c => {
                div.innerHTML += `
                    <p>Nombre: ${c.name} | Balance: ${c.balance}</p>
                `;
            });
        }

        function irAPI() {
            window.location.href = 'http://localhost:3000/accounts';
        }

        cargar();
    </script>

</body>
</html>
