<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Cuentas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        input,
        button {
            margin: 5px;
            padding: 5px;
        }

        .account {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 5px 0;
        }
    </style>
</head>

<body>

    <h1>Gestión de Cuentas</h1>

    <h2>Crear Cuenta</h2>
    <input type="text" id="name" placeholder="Nombre">
    <input type="number" id="balance" placeholder="Balance">
    <button onclick="createAccount()">Crear</button>

    <h2>Lista de Cuentas</h2>
    <button onclick="getAccounts()">Actualizar Lista</button>
    <div id="accountsList"></div>

    <script>
        const API_URL = "http://localhost:3000/accounts";

        async function getAccounts() {
            const response = await fetch(API_URL);
            const accounts = await response.json();

            const container = document.getElementById("accountsList");
            container.innerHTML = "";

            accounts.forEach((acc, index) => {
                container.innerHTML += `
                    <div class="account">
                        <strong>ID:</strong> ${index} <br>
                        <strong>Nombre:</strong> ${acc.name || ''} <br>
                        <strong>Balance:</strong> ${acc.balance || ''} <br>
                        <button onclick="deleteAccount(${index})">Eliminar</button>
                    </div>
                `;
            });
        }

        async function createAccount() {
            const name = document.getElementById("name").value;
            const balance = document.getElementById("balance").value;

            await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ name, balance })
            });

            getAccounts();
        }

        async function deleteAccount(id) {
            await fetch(`${API_URL}/${id}`, {
                method: "DELETE"
            });

            getAccounts();
        }

        // Cargar cuentas al iniciar
        getAccounts();
    </script>

</body>

</html>
