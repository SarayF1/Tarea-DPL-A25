<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Cuentas</title>
</head>

<body>

    <h1>Gestión de Cuentas</h1>

    <h2>Crear Cuenta</h2>
    <input type="text" id="name" placeholder="Nombre">
    <input type="number" id="balance" placeholder="Balance">
    <button onclick="createAccount()">Crear</button>

    <h2>Lista de Cuentas</h2>
    <button onclick="getAccounts()">Actualizar</button>
    <div id="accountsList"></div>

    <script>
        const API_URL = "http://localhost:3000/accounts";

        async function getAccounts() {
            const response = await fetch(API_URL);
            const accounts = await response.json();

            const container = document.getElementById("accountsList");
            container.innerHTML = "";

            accounts.forEach(acc => {
                container.innerHTML += `
                    <div>
                        <strong>Nombre:</strong> ${acc.name} <br>
                        <strong>Balance:</strong> ${acc.balance}
                        <hr>
                    </div>
                `;
            });
        }

        async function createAccount() {
            const name = document.getElementById("name").value;
            const balance = Number(document.getElementById("balance").value);

            await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ name, balance })
            });

            document.getElementById("name").value = "";
            document.getElementById("balance").value = "";

            getAccounts();
        }

        getAccounts();
    </script>

</body>

</html>
